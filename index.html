<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบรายงานค่าฝุ่น จ.เชียงใหม่ (CCDC)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- html2canvas สำหรับ Export รูปภาพ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800;900&family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #f8fafc; /* พื้นหลังสีเทาอ่อน สบายตา */
            -webkit-tap-highlight-color: transparent; 
        }
        
        /* Spinner สำหรับโหลดข้อมูล */
        .loading-spinner {
            border: 3px solid transparent; border-radius: 50%; border-top: 3px solid #0074e4;
            width: 18px; height: 18px; animation: spin 1s linear infinite;
            display: inline-block; vertical-align: middle;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* บังคับฟอนต์ Prompt */
        .export-prompt-font, .export-prompt-font * {
            font-family: 'Prompt', sans-serif !important;
        }

        /* ซ่อน Scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased min-h-screen pb-12">

    <!-- ส่วนบังคับโหลดฟอนต์ Prompt ล่วงหน้า -->
    <div style="font-family: 'Prompt', sans-serif; font-weight: 600; position: absolute; left: -9999px; top: -9999px; visibility: hidden;">Force Load Prompt 600</div>

    <!-- Mobile Container -->
    <div class="w-full max-w-md mx-auto bg-[#f8fafc] min-h-screen flex flex-col relative overflow-x-hidden pb-8">

        <!-- 1. Slim App Header (ส่วนหัวใหม่ กระทัดรัด ไม่กินพื้นที่) -->
        <div class="sticky top-0 z-50 bg-white px-4 py-3 flex justify-between items-center shadow-sm border-b border-slate-100">
            <div>
                <h1 class="text-[16px] font-black text-slate-800 leading-none tracking-tight">รายงานค่าฝุ่น <span class="text-[#0074e4]">จ.เชียงใหม่</span></h1>
                <div id="statusMessage" class="text-[10px] font-bold text-slate-400 mt-1 min-h-[16px]">รอการอัปเดต...</div>
            </div>
            <button onclick="fetchDataCCDC()" id="btnHeaderUpdate" class="w-9 h-9 bg-slate-50 border border-slate-200 hover:bg-slate-100 active:scale-95 rounded-full flex justify-center items-center text-slate-600 transition-colors shadow-sm">
                <span class="loading-spinner hidden" style="border-top-color: #0074e4; border-width: 2px; width: 14px; height: 14px;"></span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
            </button>
        </div>

        <!-- Update Time -->
        <div id="timeDisplay" class="hidden px-4 mt-3 flex justify-between items-center">
            <span class="text-[11px] font-black text-slate-400 uppercase tracking-widest">อัปเดตล่าสุด:</span>
            <span id="timeValue" class="text-[11px] font-bold text-[#0074e4] bg-blue-50 px-2.5 py-1 rounded-md"></span>
        </div>

        <div class="px-4 mt-3 space-y-4">

            <!-- 2. Action Buttons (ปุ่มทำงานอยู่บนสุด) -->
            <div class="flex flex-col gap-2.5">
                <button onclick="saveImageWithTemplate(this)" class="w-full bg-[#0074e4] hover:bg-blue-600 text-white py-3.5 px-4 rounded-xl text-[14px] font-bold shadow-md transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                    <span>บันทึกรูป (ใส่กรอบ Template)</span>
                </button>

                <button onclick="saveCCDCRankingImage()" class="w-full bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 py-3 px-4 rounded-xl text-[13px] font-bold shadow-sm transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                    <span>บันทึกแบบตารางปกติ</span>
                </button>
            </div>

            <!-- 3. Legacy Report Text (ข้อความโพสต์) -->
            <div id="legacyCopySection" class="hidden bg-white rounded-[20px] shadow-sm border border-slate-100 p-4">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-[13px] font-black text-slate-800 flex items-center gap-1.5 pl-1">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-[#0074e4]"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        ข้อความสำหรับโพสต์
                    </h3>
                    <button onclick="copyLegacyReportText()" class="bg-blue-50 text-blue-600 hover:bg-blue-100 px-3 py-1.5 rounded-lg text-[11px] font-bold transition-colors active:scale-95 flex items-center gap-1">
                        <span id="copyLegacyStatus">คัดลอกข้อความ</span>
                    </button>
                </div>
                <div id="legacyReportText" class="bg-slate-50/80 rounded-xl p-3 border border-slate-100 text-[11px] font-medium text-slate-600 leading-relaxed whitespace-pre-wrap h-[120px] overflow-y-auto no-scrollbar shadow-inner"></div>
            </div>

            <!-- 4. Preview Grid Section (พรีวิวตาราง) -->
            <div id="mainContentSection" class="hidden">
                <div class="bg-white rounded-[20px] shadow-sm border border-slate-100 p-4 pt-3">
                    <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-1.5 mb-3">
                        พรีวิวตาราง 25 อำเภอ
                    </h3>
                    
                    <div id="ccdc-ranking-export-container" class="export-prompt-font w-full" style="background-color: transparent;">
                        <div id="ccdc-grid-container" style="display: grid; gap: 12px; width: 100%;">
                            <!-- Rendered JS content -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- 5. Settings Section (ตั้งค่าเพิ่มเติม) -->
            <div class="bg-white p-4 rounded-[20px] shadow-sm border border-slate-100 mb-6">
                <h3 class="text-[12px] font-black text-slate-800 mb-3">ตั้งค่าเพิ่มเติม</h3>
                
                <div class="space-y-4">
                    <!-- 1. ตั้งค่ากรอบรูปภาพ -->
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 mb-1.5">เปลี่ยนภาพพื้นหลัง (Template)</label>
                        <input type="file" id="bgImageInput" accept="image/*" class="w-full text-[11px] text-slate-600 bg-slate-50 border border-slate-100 rounded-lg p-1.5 cursor-pointer file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-[10px] file:font-bold file:bg-[#0074e4] file:text-white outline-none">
                        <img id="template-preview-img" style="display: none;" class="mt-2 max-w-[100px] rounded-lg border border-slate-200 shadow-sm" />
                    </div>

                    <!-- 2. ตั้งค่าจำนวนคอลัมน์ -->
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 mb-1.5">การแสดงผลพรีวิว (คอลัมน์)</label>
                        <select id="ccdcGridCols" onchange="renderCCDCRankingGrid()" class="w-full bg-slate-50 border border-slate-100 rounded-lg text-[12px] px-2 py-2 font-bold text-slate-700 outline-none">
                            <option value="4">4 คอลัมน์</option>
                            <option value="5" selected>5 คอลัมน์ (แนะนำ)</option>
                            <option value="6">6 คอลัมน์</option>
                        </select>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <!-- โค้ด JavaScript ต้นฉบับจาก 'รายงานค่าฝุ่น auto.html' ที่คุณอัปโหลดมาล่าสุด (100% Original) -->
    <script>
        const allDistricts = ["เมืองเชียงใหม่", "จอมทอง", "แม่แจ่ม", "เชียงดาว", "ดอยสะเก็ด", "แม่แตง", "แม่ริม", "สะเมิง", "ฝาง", "แม่อาย", "พร้าว", "สันป่าตอง", "สันกำแพง", "สันทราย", "หางดง", "ฮอด", "ดอยเต่า", "อมก๋อย", "สารภี", "เวียงแหง", "ไชยปราการ", "แม่วาง", "แม่ออน", "ดอยหล่อ", "กัลยาณิวัฒนา"];
        
        const DEFAULT_GAS_URL = "https://script.google.com/macros/s/AKfycbwzfx6uMAVR0b45YUtmQepYJEjmmLTP-siGf2ybxYRrVAP_qxUFvu-E3xj9f9o8fP0WMQ/exec";

        let currentData = null;
        let updateTimeStr = '';      // ตัวเต็มสำหรับหน้าเว็บ
        let shortUpdateTimeStr = ''; // ตัวย่อสำหรับแปะรูป

        document.getElementById('bgImageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const previewImg = document.getElementById('template-preview-img');
                    previewImg.src = event.target.result;
                }
                reader.readAsDataURL(file);
            }
        });

        window.onload = function() {
            fetchDataCCDC();
        };

        async function fetchDataCCDC() {
            const statusEl = document.getElementById('statusMessage');
            const btn = document.getElementById('btnHeaderUpdate');
            const spinner = btn.querySelector('.loading-spinner');

            btn.disabled = true; spinner?.classList.remove('hidden');
            statusEl.innerText = "กำลังดึงข้อมูลอัปเดตล่าสุด...";
            statusEl.className = "text-xs font-bold text-blue-500 animate-pulse";

            try {
                const response = await fetch(DEFAULT_GAS_URL, { method: 'GET', redirect: 'follow' });
                if (!response.ok) throw new Error("HTTP error");
                
                const data = await response.json();
                if (data.html) {
                    analyzeDustHTML(data.html);
                    statusEl.innerText = "อัปเดตข้อมูลสำเร็จ";
                    statusEl.className = "text-xs font-bold text-green-500";
                    setTimeout(() => { statusEl.innerText = ""; }, 3000);
                } else {
                    throw new Error("No HTML Data");
                }
            } catch (err) {
                statusEl.innerText = `ไม่สามารถดึงข้อมูลอัตโนมัติได้`;
                statusEl.className = "text-xs font-bold text-red-500";
            } finally {
                btn.disabled = false; spinner?.classList.add('hidden');
            }
        }

        function analyzeDustHTML(html) {
            if (!html) return;
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');

            let rawDateText = "";
            doc.querySelectorAll('p').forEach(p => {
                if (p.innerText.includes("อัพเดทข้อมูลเมื่อ")) {
                    rawDateText = p.innerText.replace("อัพเดทข้อมูลเมื่อ :", "").trim();
                }
            });
            
            const dateObj = parseThaiDate(rawDateText);
            updateTimeStr = getFullThaiDateString(dateObj, rawDateText);
            shortUpdateTimeStr = getShortThaiDateString(dateObj, rawDateText);

            const knownStations = {
                "รพ.สต.บ้านปางเฟือง": "เชียงดาว", "รร.บ้านปางเฟือง": "เชียงดาว", "รพ.สต.บ้านขามสุ่มป่า": "พร้าว",
                "สนามกีฬากลาง 60 ปี ม.เชียงใหม่": "เมืองเชียงใหม่", "สสอ.อมก๋อย": "อมก๋อย", "รพ.สต.บ้านทุ่งข้าวพวง": "เชียงดาว"
            };

            const districtMap = {};
            doc.querySelectorAll('tr').forEach(row => {
                const nameEl = row.querySelector('.db_namez');
                const valEl = row.querySelector('.c_value');
                if (nameEl && valEl) {
                    let fullName = nameEl.innerText.trim();
                    const value = Math.round(parseFloat(valEl.innerText.trim()));
                    let aName = null;
                    
                    for (const [station, district] of Object.entries(knownStations)) {
                        if (fullName.includes(station)) {
                            aName = district;
                            if (!fullName.includes("อ.") && !fullName.includes("อำเภอ")) fullName += ` อ.${district === "เมืองเชียงใหม่" ? "เมือง" : district}`;
                            break;
                        }
                    }

                    if (!aName) {
                        const amphoeMatch = fullName.match(/(?:อ\.|อำเภอ)\s*([ก-๙]+)/);
                        if (amphoeMatch) {
                            aName = amphoeMatch[1].trim();
                        } else {
                            for (let d of allDistricts) {
                                let checkName = d === "เมืองเชียงใหม่" ? "เมือง" : d;
                                if (fullName.includes(checkName)) { aName = d; break; }
                            }
                        }
                    }

                    if (aName) {
                        if (aName === "เมือง") aName = "เมืองเชียงใหม่";
                        if (!districtMap[aName] || value > districtMap[aName].val) {
                            districtMap[aName] = { val: value, loc: fullName };
                        }
                    }
                }
            });

            let resultData = [];
            allDistricts.forEach(dist => {
                if (districtMap[dist]) {
                    resultData.push({ name: dist, val: districtMap[dist].val, loc: districtMap[dist].loc });
                } else {
                    resultData.push({ name: dist, val: -1, loc: 'ไม่มีข้อมูลจากจุดตรวจวัด' });
                }
            });

            resultData.sort((a, b) => {
                if (a.val === -1) return 1;
                if (b.val === -1) return -1;
                return b.val - a.val;
            });

            currentData = resultData;
            
            document.getElementById('mainContentSection').classList.remove('hidden');
            document.getElementById('legacyCopySection').classList.remove('hidden');
            
            if(updateTimeStr) {
                document.getElementById('timeValue').innerText = updateTimeStr;
                document.getElementById('timeDisplay').classList.remove('hidden');
            }

            renderCCDCRankingGrid();
            generateTextReport();
        }

        function renderCCDCRankingGrid() {
            if(!currentData) return;
            const cols = parseInt(document.getElementById('ccdcGridCols').value);
            const container = document.getElementById('ccdc-grid-container');
            container.style.gridTemplateColumns = `repeat(${cols}, minmax(0, 1fr))`;
            
            let html = '';
            currentData.forEach((item, index) => {
                const isMissing = item.val === -1;
                let colors = getAqiColorForBlock(item.val);
                if (isMissing) colors = { bg: '#e5e7eb', text: '#6b7280', mapText: '#6b7280', border: '#d1d5db' };
                
                const isDarkText = colors.mapText === '#111827';
                const textShadowStyle = isDarkText ? '1px 1px 1px rgba(255,255,255,0.9)' : '1px 1px 3px rgba(0,0,0,0.6)';
                
                let nameSize = '17cqi'; 
                if (item.name === "เมืองเชียงใหม่" || item.name === "กัลยาณิวัฒนา") nameSize = '12cqi';
                else if (item.name.length > 7) nameSize = '14.5cqi';

                html += `
                <div class="ranking-block relative px-2 rounded-2xl shadow-sm border-2 overflow-hidden flex flex-col justify-between items-center" 
                     style="background-color: ${colors.bg}; color: ${colors.text}; border-color: ${colors.border || colors.bg}; aspect-ratio: 1 / 1; padding: 6% 2%; container-type: inline-size;">
                    <div class="w-full flex flex-col items-center mt-[2%]">
                        <span class="font-extrabold rank-text leading-none opacity-90 block" style="font-size: 11cqi; text-shadow: ${isMissing?'none':textShadowStyle};">#${index + 1}</span>
                        <span class="font-bold tracking-wide leading-none name-text text-center w-full block mt-[4%]" style="font-size: ${nameSize}; white-space: nowrap; text-shadow: ${isMissing?'none':textShadowStyle};">${item.name}</span>
                    </div>
                    <div class="w-full flex flex-col items-center mb-[8%]">
                        ${isMissing ? 
                            `<span class="font-bold opacity-80 pm25-text" style="font-size: 14cqi;">ไม่มีข้อมูล</span>` 
                        : 
                            `<span class="font-extrabold leading-none pm25-text block mb-[2%]" style="font-size: 42cqi; text-shadow: ${textShadowStyle};">${item.val}</span>
                             <span class="font-semibold opacity-90 unit-text leading-none block" style="font-size: 10cqi; text-shadow: ${textShadowStyle};">µg/m³</span>`
                        }
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function captureGridToCanvas(scaleMultiplier = 2) {
            return new Promise((resolve, reject) => {
                const element = document.getElementById('ccdc-ranking-export-container');
                if (!element) return reject("ไม่พบตาราง Grid");
                element.style.width = '1200px'; 
                
                html2canvas(element, { 
                    scale: scaleMultiplier, backgroundColor: null, useCORS: true, logging: false,
                    onclone: (clonedDoc) => {
                        const style = clonedDoc.createElement('style');
                        style.innerHTML = `* { font-family: 'Prompt', sans-serif !important; }`;
                        clonedDoc.head.appendChild(style);

                        const originalBlocks = document.querySelectorAll('#ccdc-grid-container .ranking-block');
                        const clonedBlocks = clonedDoc.querySelectorAll('#ccdc-grid-container .ranking-block');
                        clonedBlocks.forEach((clonedBlock, idx) => {
                            if(originalBlocks[idx]) {
                                const w = originalBlocks[idx].offsetWidth;
                                const txtRank = clonedBlock.querySelector('.rank-text');
                                const txtName = clonedBlock.querySelector('.name-text');
                                const txtPm25 = clonedBlock.querySelector('.pm25-text');
                                const txtUnit = clonedBlock.querySelector('.unit-text');

                                let dName = txtName ? txtName.innerText : "";
                                let nameRatio = 0.17;
                                if (dName === "เมืองเชียงใหม่" || dName === "กัลยาณิวัฒนา") nameRatio = 0.12;
                                else if (dName.length > 7) nameRatio = 0.145;

                                if (txtRank) { txtRank.style.fontSize = (w * 0.11) + 'px'; txtRank.style.marginBottom = (w * 0.04) + 'px'; txtRank.style.transform = 'translateY(-' + (w * 0.04) + 'px)'; }
                                if (txtName) { txtName.style.fontSize = (w * nameRatio) + 'px'; txtName.style.height = (w * 0.22) + 'px'; txtName.style.display = 'flex'; txtName.style.alignItems = 'center'; txtName.style.justifyContent = 'center'; txtName.style.transform = 'translateY(-' + (w * 0.10) + 'px)'; }
                                if (txtPm25) { 
                                    if (txtPm25.innerText === 'ไม่มีข้อมูล') { txtPm25.style.fontSize = (w * 0.14) + 'px'; txtPm25.style.transform = 'translateY(-' + (w * 0.12) + 'px)'; } 
                                    else { txtPm25.style.fontSize = (w * 0.42) + 'px'; txtPm25.style.marginBottom = '0px'; txtPm25.style.transform = 'translateY(-' + (w * 0.16) + 'px)'; }
                                }
                                if (txtUnit) { txtUnit.style.fontSize = (w * 0.10) + 'px'; txtUnit.style.transform = 'translateY(-' + (w * 0.12) + 'px)'; }
                            }
                        });
                    }
                }).then(canvas => {
                    element.style.width = ''; 
                    resolve(canvas);
                }).catch(reject);
            });
        }

        async function saveCCDCRankingImage() {
            try {
                const canvas = await captureGridToCanvas(2);
                const link = document.createElement("a");
                link.href = canvas.toDataURL("image/png");
                link.download = `PM25_CCDC_GridRanking_${Date.now()}.png`;
                link.click();
            } catch (err) {
                alert("เกิดข้อผิดพลาด: " + err);
            }
        }

        async function saveImageWithTemplate(btnElement) {
            if(!currentData) { alert("กรุณารอโหลดข้อมูลให้เสร็จก่อน"); return; }
            
            const btn = btnElement ? btnElement : document.querySelector('button[onclick="saveImageWithTemplate(this)"]');
            const originalText = btn ? btn.innerHTML : "บันทึกรูป (ใส่กรอบ Template)";
            if (btn) {
                btn.innerHTML = `<span class="loading-spinner"></span><span class="ml-2">กำลังประมวลผล...</span>`;
                btn.disabled = true;
            }

            const defaultTemplateUrl = "https://img2.pic.in.th/-c54d2bbd8578abf4.jpg";

            try {
                // 1. โหลดรูปตารางปกติไว้ในหน่วยความจำก่อน (สัดส่วนตารางเป๊ะแน่นอน)
                const rawGridCanvas = await captureGridToCanvas(2); 
                const gridImg = new Image();
                gridImg.src = rawGridCanvas.toDataURL("image/png");
                await new Promise(resolve => { gridImg.onload = resolve; });

                // 2. โหลดรูปกรอบและจัดการ CORS แบบเด็ดขาด
                let bgImgSrc = "";
                const uploadedImg = document.getElementById('template-preview-img');
                
                if (uploadedImg && uploadedImg.src && uploadedImg.src.startsWith("data:")) {
                    bgImgSrc = uploadedImg.src;
                } else {
                    // ใช้ Proxy หลายตัวสำรองเพื่อเลี่ยงบล็อก CORS
                    const proxies = [
                        `https://wsrv.nl/?url=${encodeURIComponent(defaultTemplateUrl)}&output=jpg`,
                        `https://api.allorigins.win/raw?url=${encodeURIComponent(defaultTemplateUrl)}`,
                        `https://corsproxy.io/?${encodeURIComponent(defaultTemplateUrl)}`
                    ];
                    let fetchSuccess = false;
                    for (let proxy of proxies) {
                        try {
                            const res = await fetch(proxy);
                            if (res.ok) {
                                const blob = await res.blob();
                                bgImgSrc = await new Promise((res, rej) => {
                                    const reader = new FileReader();
                                    reader.onloadend = () => res(reader.result);
                                    reader.onerror = rej;
                                    reader.readAsDataURL(blob); // แปลงเป็น Base64 เลี่ยง CORS
                                });
                                fetchSuccess = true;
                                break;
                            }
                        } catch(e) {
                            console.warn("Proxy failed:", proxy);
                        }
                    }
                    if (!fetchSuccess) {
                        bgImgSrc = defaultTemplateUrl + "?nocache=" + Date.now();
                    }
                }

                const bgImg = new Image();
                bgImg.crossOrigin = "anonymous";
                await new Promise((resolve, reject) => {
                    bgImg.onload = resolve;
                    bgImg.onerror = () => reject(new Error("เบราว์เซอร์บล็อกรูปลิงก์กรอบรูป กรุณาอัปโหลดรูปด้วยตนเองในข้อ 1 ครับ"));
                    bgImg.src = bgImgSrc;
                });

                // 3. พิมพ์วันที่เวลา ฟอนต์ Prompt
                await document.fonts.load('600 27px "Prompt"');
                await document.fonts.ready;

                const dateDiv = document.createElement('div');
                dateDiv.style.position = 'fixed';
                dateDiv.style.top = '-9999px';
                dateDiv.style.left = '0px';
                dateDiv.style.width = '1080px';
                dateDiv.style.textAlign = 'center';
                dateDiv.style.color = '#ffffff';
                dateDiv.style.fontFamily = "'Prompt', sans-serif";
                dateDiv.style.fontWeight = '600';
                dateDiv.style.fontSize = '27px';
                // เพิ่มระยะขอบกันตัวหนังสือ/วรรณยุกต์โดนตัด
                dateDiv.style.lineHeight = '1.5'; 
                dateDiv.style.paddingTop = '10px';
                dateDiv.style.paddingBottom = '10px';
                dateDiv.style.textShadow = '1px 1px 4px rgba(0,0,0,0.4)';
                dateDiv.innerText = shortUpdateTimeStr;
                document.body.appendChild(dateDiv);

                await new Promise(r => setTimeout(r, 100)); // รอเรนเดอร์เล็กน้อย

                const dateCanvas = await html2canvas(dateDiv, { backgroundColor: null, scale: 2, logging: false });
                document.body.removeChild(dateDiv);

                // 4. ประกอบร่าง (ปรับขนาดให้เท่ากับรูปกรอบต้นฉบับ 1080x1350 พอดีเป๊ะ)
                const finalCanvas = document.createElement('canvas');
                finalCanvas.width = 1080;
                finalCanvas.height = 1350;
                const ctx = finalCanvas.getContext('2d');
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';

                ctx.drawImage(bgImg, 0, 0, finalCanvas.width, finalCanvas.height);

                // ตารางปกติ
                const startY = 225;       
                const targetHeight = 840; 
                const drawWidth = (gridImg.width / gridImg.height) * targetHeight; 
                const drawHeight = targetHeight;
                const startX = (finalCanvas.width - drawWidth) / 2;
                ctx.drawImage(gridImg, startX, startY, drawWidth, drawHeight);

                // ข้อความวันที่ (ปรับตำแหน่งลงมาที่ 137px ตามที่กำหนด)
                const targetYPosition = 137;
                // เนื่องจากตอนสร้างรูปตัวหนังสือ เราใช้ scale: 2 (คมชัด 2 เท่า) ตอนนำมาแปะจึงต้องหาร 2 เพื่อให้ขนาดพอดีกรอบ
                const dateDrawWidth = 1080;
                const dateDrawHeight = dateCanvas.height / 2;
                const dateTargetY = targetYPosition - (dateDrawHeight / 2);
                ctx.drawImage(dateCanvas, 0, dateTargetY, dateDrawWidth, dateDrawHeight);

                const link = document.createElement("a");
                link.href = finalCanvas.toDataURL("image/jpeg", 1.0); 
                let fileDate = shortUpdateTimeStr.replace(/[\s\.]/g, '_').replace(/:/g, '');
                link.download = `PM25_Report_${fileDate}.jpg`;
                link.click();

                if (bgImgSrc.startsWith('blob:') || bgImgSrc.startsWith('data:')) URL.revokeObjectURL(bgImgSrc);

            } catch (err) {
                console.error("Save Error:", err);
                alert(err.message);
            } finally {
                if (btn) {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            }
        }

        function generateTextReport() {
            if (!currentData) return;
            let text = `ค่าฝุ่น "จ.เชียงใหม่"\n${shortUpdateTimeStr || 'ล่าสุด'}\n.\n`;
            currentData.forEach((item, index) => {
                let districtName = item.name === 'เมืองเชียงใหม่' ? 'เมือง' : item.name;
                if (item.val === -1) { text += `อันดับ ${index + 1} : อ.${districtName} (ไม่มีข้อมูล)\n`; } 
                else {
                    let locStr = item.loc.replace(/\s*(?:อ\.|อำเภอ|จ\.|จังหวัด)\s*[ก-๙]+/g, '').trim();
                    text += `อันดับ ${index + 1} : อ.${districtName} ${item.val} µg/m³\n(จุด : ${locStr})\n`;
                }
            });
            text += `.\nข้อมูลอ้างอิง : CMU CCDC (ค่าตามจุดตรวจวัดที่สูงที่สุดของอำเภอนั้น)`;
            document.getElementById('legacyReportText').innerText = text;
        }

        function copyLegacyReportText() {
            const text = document.getElementById('legacyReportText').innerText;
            const textarea = document.createElement("textarea");
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);

            const statusEl = document.getElementById('copyLegacyStatus');
            const oldText = statusEl.innerText;
            statusEl.innerText = 'คัดลอกสำเร็จ!';
            setTimeout(() => { statusEl.innerText = oldText; }, 2000);
        }

        function parseThaiDate(rawDateStr) {
            let d = new Date(rawDateStr.replace(" ", "T"));
            if (isNaN(d.getTime())) {
                const thaiMonths = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
                const thaiMonthsShort = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
                let day = 1, month = 0, year = new Date().getFullYear(), hrs = 0, mins = 0;
                let foundMonth = false;
                let yearMatch = rawDateStr.match(/25\d{2}/);
                if(yearMatch) year = parseInt(yearMatch[0]) - 543;
                let nums = rawDateStr.match(/\d+/g);
                if (nums) { for(let n of nums) { if(parseInt(n) >= 1 && parseInt(n) <= 31) { day = parseInt(n); break; } } }
                let timeMatch = rawDateStr.match(/([0-2]?\d):([0-5]\d)/);
                if(timeMatch) { hrs = parseInt(timeMatch[1]); mins = parseInt(timeMatch[2]); }
                for (let i = 0; i < 12; i++) {
                    if (rawDateStr.includes(thaiMonths[i]) || rawDateStr.includes(thaiMonthsShort[i])) {
                        month = i; foundMonth = true; break;
                    }
                }
                if (foundMonth) d = new Date(year, month, day, hrs, mins);
            }
            return isNaN(d.getTime()) ? null : d;
        }

        function getFullThaiDateString(d, raw) {
            if (!d) return raw;
            const days = ["วันอาทิตย์", "วันจันทร์", "วันอังคาร", "วันพุธ", "วันพฤหัสบดี", "วันศุกร์", "วันเสาร์"];
            const months = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            return `${days[d.getDay()]}ที่ ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear() + 543} เวลา ${String(d.getHours()).padStart(2, '0')}:${String(d.getHours() === 0 ? '00' : String(d.getMinutes()).padStart(2, '0'))} น.`;
        }

        function getShortThaiDateString(d, raw) {
            if (!d) return raw; 
            const monthsShort = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
            let year2Digits = String(d.getFullYear() + 543).slice(-2);
            return `${d.getDate()} ${monthsShort[d.getMonth()]} ${year2Digits} เวลา ${String(d.getHours()).padStart(2, '0')}.${String(d.getMinutes()).padStart(2, '0')} น.`;
        }

        function getAqiColorForBlock(val) {
            if (val > 75) return { bg: '#FF0000', text: 'white', mapText: '#ffffff' }; 
            if (val > 37.5) return { bg: '#FF9900', text: 'white', mapText: '#ffffff' }; 
            if (val > 25) return { bg: '#FFFF00', text: '#111827', mapText: '#111827' }; 
            if (val > 15) return { bg: '#92D050', text: 'white', mapText: '#ffffff' }; 
            if (val >= 0) return { bg: '#00B0F0', text: 'white', mapText: '#ffffff' }; 
            return { bg: '#e5e7eb', text: '#374151', mapText: '#374151' }; 
        }
